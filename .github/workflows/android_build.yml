name: Build and Release APK on GitHub

on:
  push:
    tags:
      - "v*"  # Trigger on tags like v1.0.0, v2.3.5, etc.

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Adicione esta linha para conceder permissão de escrita
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 1. Decodificar a Keystore a partir do Secret Base64
      - name: Decode Keystore
        run: |
          printf "%s" "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.jks

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Create local properties with Supabase credentials
      - name: Create local.properties
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> local.properties
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> local.properties

      - name: Build with Gradle
        env:
          # Essas variáveis serão lidas pelo seu build.gradle
          RELEASE_STORE_FILE: "release.jks"
          RELEASE_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Get release version from tag
        id: get_version
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref }}
          name: Release v${{ env.RELEASE_VERSION }}
          body: "APK release for version ${{ env.RELEASE_VERSION }}"
          files: |
            app/build/outputs/apk/**/*.apk
          draft: false
          prerelease: false

      - name: Clean up sensitive files
        if: always()
        run: |
          rm -f app/release.jks
          rm -f local.properties
